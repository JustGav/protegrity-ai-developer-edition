<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnicalApp – Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/protegrity-theme.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--pg-orange) 0%, var(--pg-dark) 45%, var(--pg-bg) 100%); color: #e2e8f0;
               display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: var(--pg-surface); padding: 2.5rem; border-radius: 12px;
                      width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid var(--pg-border); }
        .login-brand { text-align: center; margin-bottom: 1.5rem; }
        .login-brand img { height: 24px; width: auto; margin-bottom: 1rem; }
        .login-card h1 { text-align: center; margin-bottom: 0.5rem; color: #fff; font-size: 1.35rem; font-weight: 500; }
        .login-card .subtitle { text-align: center; color: var(--pg-slate); margin-bottom: 2rem; font-size: 0.85rem; }
        .badge { display: inline-block; background: var(--pg-orange); color: white; padding: 2px 10px;
                 border-radius: 12px; font-size: 0.75rem; }
        label { display: block; margin-bottom: 0.3rem; color: var(--pg-slate); font-size: 0.85rem; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid var(--pg-border);
            border-radius: 6px; background: var(--pg-bg); color: #e2e8f0; font-size: 0.95rem; }
        input:focus { outline: none; border-color: var(--pg-orange); }
        button { width: 100%; padding: 0.75rem; background: var(--pg-orange); color: white;
                 border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: var(--pg-orange-dark); }
        .error { background: #7f1d1d; color: #fca5a5; padding: 0.6rem; border-radius: 6px;
                 margin-bottom: 1rem; font-size: 0.85rem; text-align: center; }
        .hint { text-align: center; color: #64748b; font-size: 0.75rem; margin-top: 1.5rem; }
        .hint code { background: var(--pg-border); padding: 1px 4px; border-radius: 3px; color: var(--pg-slate); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <img src="{{ url_for('static', filename='images/protegrity-logo.svg') }}" alt="Protegrity">
        </div>
        <h1>TechnicalApp</h1>
        <p class="subtitle">Orchestration & Protegrity Configuration <span class="badge">TECH</span></p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="admin" autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••">

            <button type="submit">Sign In</button>
        </form>

        <p class="hint">
            Admin: <code>admin</code> / <code>Adm!n@S3cure2026</code><br>
            Engineer: <code>engineer</code> / <code>Eng#Pr0tegrity!</code><br>
            LangGraph: <code>langgraph</code> / <code>L@ngGr4ph!Demo</code><br>
            CrewAI: <code>crewai</code> / <code>Cr3wAI#S3cure</code><br>
            LlamaIndex: <code>llamaindex</code> / <code>Ll@m4Idx!2026</code>
        </p>
    </div>
</body>
</html>
